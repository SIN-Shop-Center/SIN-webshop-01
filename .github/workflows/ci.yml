name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - 'codex/**'

jobs:
  guards:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Monolith line guard
        run: node scripts/guard-lines.mjs

      - name: Complexity guard
        run: node scripts/guard-complexity.mjs

  nextjs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Test
        run: node scripts/ensure-supported-node.mjs && node --experimental-strip-types --no-warnings --test scripts/lib/cli-env.test.mjs scripts/lib/google-api.test.mjs scripts/lib/web-production-env.test.mjs scripts/governance-doc-sync.test.mjs scripts/project-ssot-doc-sync.test.mjs scripts/google-secret-sync.test.mjs scripts/sin-a2a-doc-sync.test.mjs scripts/check-governance-preflight.test.mjs scripts/storefront-legal-sync.test.mjs scripts/guard-baseline-validate.test.mjs

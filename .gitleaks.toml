title = "ShopSIN gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Global allowlist for build artifacts and lock files"
paths = [
  '''\.open-next''',
  '''\.open-next-deploy''',
  '''node_modules\/''',
  '''\.next\/''',
  '''dist\/''',
  '''build\/''',
  '''coverage\/''',
  '''\.turbo\/''',
  '''\.npm-cache\/''',
  '''output\/''',
  '''tmp\/''',
  '''pnpm-lock\.yaml''',
  '''package-lock\.json''',
  '''yarn\.lock''',
  '''bun\.lockb''',
  '''bun\.lock''',
  '''Gemfile\.lock''',
  '''composer\.lock''',
  '''Podfile\.lock''',
  '''Cargo\.lock''',
  '''flake\.lock''',
  '''renv\.lock''',
  '''packages\.lock\.json''',
  '''go\.sum''',
  '''gradlew''',
  '''gradlew\.bat''',
  '''mvnw''',
  '''mvnw\.cmd''',
  '''settings\.gradle''',
  '''build\.gradle''',
  '''gradle\.properties''',
  '''pom\.xml''',
  '''vendor\/''',
  '''test\/''',
  '''tests\/''',
  '''spec\/''',
  '''__tests__\/''',
  '''\.git\/''',
  '''.*\.min\..*''',
  '''.*\.map$''',
  '''.*\.sum$''',
  '''.*\.lock$''',
  '''\.env\.production''',
  '''\.env\.local''',
  '''\.env\.example''',
  '''gitleaks\.toml''',
  '''gitleaksAllowlist\.toml''',
  '''gitleaks-baseline\.json''',
]

[[rules]]
id = "jwt"

  /admin/customers:
    get:
      summary: Admin list customers
      responses:
        '200':
          description: Customer list
    post:
      summary: Admin create customer
      responses:
        '201':
          description: Created
  /admin/customers/{id}:
    get:
      summary: Admin get customer
      parameters:
